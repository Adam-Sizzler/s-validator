name: Deploy S Validator
run-name: Deploy ${{ github.event.client_payload.release_tag }} to GitHub Pages

on:
    repository_dispatch:
        types: [pages-release]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout release tag
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.client_payload.release_tag || github.ref }}

            - name: Setup Pages
              uses: actions/configure-pages@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.25.7'
                  check-latest: true
                  cache-dependency-path: go/go.sum

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build wasm + schema
              run: cd go && make build

            - name: Build frontend
              run: npm run build

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: dist

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
