name: Deploy S Validator
run-name: Deploy ${{ github.event.client_payload.release_tag }} to GitHub Pages

on:
    repository_dispatch:
        types: [pages-release]

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout release tag
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.client_payload.release_tag }}

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: '1.25.7'
                  check-latest: true
                  cache-dependency-path: go/go.sum

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: 'npm'
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build multi-version Pages artifact
              run: ./scripts/build-pages.sh

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: site

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
